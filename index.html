<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE — Caja de Ritmos Interactiva</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,900&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0807;
    --bg-2: #100c0a;
    --surface: #16110e;
    --surface-2: #1d1714;
    --surface-3: #251d18;
    --border: #2d231d;
    --border-2: #3a2d24;
    --text: #f5ede0;
    --text-2: #c4b5a0;
    --muted: #8a7864;
    --accent: #ff6b1a;
    --accent-2: #ffd60a;
    --accent-3: #ff3d5e;
    --active: #3df58a;
    --highlight: #00e5ff;
    --magenta: #ff5cae;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    letter-spacing: 0.01em;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(255, 107, 26, 0.10), transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(255, 61, 94, 0.08), transparent 70%),
      radial-gradient(ellipse 70% 40% at 50% 50%, rgba(0, 229, 255, 0.03), transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: ambientShift 14s ease-in-out infinite alternate;
  }

  @keyframes ambientShift {
    0% { transform: scale(1) rotate(0deg); opacity: 0.85; }
    100% { transform: scale(1.15) rotate(3deg); opacity: 1; }
  }

  /* === LAYOUT === */
  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-rows: 76px 1fr 38px;
    grid-template-columns: 280px 1fr 340px;
    grid-template-areas:
      "header header header"
      "mixer sequencer visual"
      "footer footer footer";
    height: 100vh;
  }

  /* === HEADER === */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    padding: 0 24px;
    background: rgba(22, 17, 14, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    gap: 24px;
  }

  .logo {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.04em;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent-2), var(--accent) 55%, var(--accent-3));
    box-shadow: 0 0 24px rgba(255, 107, 26, 0.6), inset 0 0 10px rgba(255,255,255,0.25);
    position: relative;
    flex-shrink: 0;
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 9px;
    border-radius: 50%;
    background: rgba(10, 8, 7, 0.7);
    box-shadow: inset 0 0 6px rgba(0,0,0,0.6);
  }
  .logo-mark.playing { animation: logoPulse 0.5s ease-out infinite; }
  @keyframes logoPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 24px rgba(255, 107, 26, 0.6), inset 0 0 10px rgba(255,255,255,0.25); }
    50% { transform: scale(1.08); box-shadow: 0 0 36px rgba(255, 107, 26, 0.9), inset 0 0 10px rgba(255,255,255,0.4); }
  }

  .logo-text { color: var(--text); }
  .logo-text span { color: var(--accent); }

  .header-divider {
    width: 1px;
    height: 36px;
    background: var(--border-2);
  }

  /* BPM Control */
  .bpm-control {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bpm-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .bpm-value {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--accent-2);
    line-height: 1;
    min-width: 60px;
    text-align: center;
    text-shadow: 0 0 12px rgba(255, 214, 10, 0.4);
  }
  .bpm-slider {
    width: 140px;
    height: 4px;
    background: var(--surface-3);
    border-radius: 2px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    cursor: pointer;
  }
  .bpm-slider::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: grab;
    box-shadow: 0 0 12px rgba(255, 107, 26, 0.6);
    border: 2px solid var(--bg);
  }
  .bpm-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: grab;
    border: 2px solid var(--bg);
    box-shadow: 0 0 12px rgba(255, 107, 26, 0.6);
  }

  /* Transport buttons */
  .transport {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn-transport {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 18px;
  }
  .btn-transport:hover {
    background: var(--surface-3);
    color: var(--text);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .btn-transport:active { transform: translateY(0); }
  .btn-transport.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-3));
    color: #1a0f08;
    border-color: transparent;
    width: 52px;
    height: 44px;
    box-shadow: 0 4px 16px rgba(255, 107, 26, 0.3);
  }
  .btn-transport.primary:hover {
    box-shadow: 0 6px 24px rgba(255, 107, 26, 0.5);
    transform: translateY(-1px);
  }
  .btn-transport.primary.playing {
    background: linear-gradient(135deg, var(--accent-3), var(--magenta));
    animation: playPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes playPulse {
    0% { box-shadow: 0 4px 16px rgba(255, 61, 94, 0.4); }
    100% { box-shadow: 0 4px 28px rgba(255, 61, 94, 0.8); }
  }

  /* === MIXER (LEFT PANEL) === */
  .mixer {
    grid-area: mixer;
    background: rgba(22, 17, 14, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
  }

  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    padding: 0 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  .track {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .track::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--track-color, var(--accent));
    opacity: 0.7;
  }
  .track:hover {
    background: var(--surface-2);
    border-color: var(--border-2);
  }
  .track.muted { opacity: 0.4; }
  .track.muted::before { opacity: 0.3; }

  .track-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .track-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--track-color, var(--text));
    letter-spacing: 0.08em;
  }
  .track-buttons {
    display: flex;
    gap: 4px;
  }
  .track-btn {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: var(--surface-3);
    border: 1px solid var(--border-2);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .track-btn:hover { color: var(--text); border-color: var(--text-2); }
  .track-btn.active.mute {
    background: var(--accent-3);
    color: #1a0f08;
    border-color: var(--accent-3);
  }
  .track-btn.active.solo {
    background: var(--accent-2);
    color: #1a0f08;
    border-color: var(--accent-2);
  }

  .track-vol {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface-3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .track-vol::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--track-color, var(--accent));
    cursor: grab;
    box-shadow: 0 0 8px var(--track-color, var(--accent));
  }
  .track-vol::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--track-color, var(--accent));
    cursor: grab;
    border: none;
    box-shadow: 0 0 8px var(--track-color, var(--accent));
  }

  /* === SEQUENCER (CENTER) === */
  .sequencer-wrap {
    grid-area: sequencer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg-2);
  }

  .sequencer-header {
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .sequencer-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .step-indicator strong {
    color: var(--accent-2);
    font-weight: 700;
  }

  .sequencer-tools {
    display: flex;
    gap: 6px;
  }
  .tool-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool-btn:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--accent);
  }

  .sequencer {
    flex: 1;
    padding: 16px 20px 20px;
    overflow: auto;
    position: relative;
  }

  .grid-wrap {
    position: relative;
    min-width: 700px;
  }

  .step-numbers {
    display: grid;
    grid-template-columns: 80px repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  .step-num {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 4px 0;
    border-radius: 4px;
  }
  .step-num.beat { color: var(--text-2); font-weight: 700; }
  .step-num.current {
    color: var(--accent-2);
    background: rgba(255, 214, 10, 0.1);
  }

  .grid {
    display: grid;
    grid-template-columns: 80px repeat(16, 1fr);
    gap: 4px;
    position: relative;
  }

  .row-label {
    display: flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--track-color, var(--text-2));
    letter-spacing: 0.06em;
    padding-right: 8px;
  }

  .cell {
    aspect-ratio: 1;
    min-height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.1s ease;
    position: relative;
    overflow: hidden;
  }
  .cell:hover {
    background: var(--surface-2);
    border-color: var(--track-color, var(--border-2));
  }
  .cell.beat-start { background: var(--surface-2); }
  .cell.active {
    background: var(--track-color, var(--accent));
    border-color: var(--track-color, var(--accent));
    box-shadow: 0 0 12px var(--track-color, var(--accent)), inset 0 0 6px rgba(255,255,255,0.2);
  }
  .cell.active.accent {
    box-shadow: 0 0 20px var(--track-color, var(--accent)), inset 0 0 8px rgba(255,255,255,0.4);
    transform: scale(1.05);
  }
  .cell.active.accent::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 3px;
  }
  .cell.current {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(255, 214, 10, 0.4);
  }
  .cell.active.current {
    animation: cellPulse 0.15s ease-out;
  }
  @keyframes cellPulse {
    0% { transform: scale(1.15); filter: brightness(1.5); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  /* Beam */
  .beam {
    position: absolute;
    top: 24px;
    bottom: 0;
    width: calc((100% - 80px) / 16 * 1 + 4px);
    background: linear-gradient(180deg, rgba(255, 214, 10, 0.18), rgba(255, 214, 10, 0.02));
    border-left: 1px solid rgba(255, 214, 10, 0.4);
    border-right: 1px solid rgba(255, 214, 10, 0.4);
    pointer-events: none;
    left: 80px;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 6px;
  }
  .beam.active { opacity: 1; }

  /* Particles canvas */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* === VISUAL PANEL (RIGHT) === */
  .visual {
    grid-area: visual;
    background: rgba(22, 17, 14, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .visualizer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .visualizer-canvas {
    width: 100%;
    aspect-ratio: 1;
    display: block;
  }

  .viz-label {
    position: absolute;
    top: 12px;
    left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  /* Patterns */
  .patterns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .pattern-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--text-2);
  }
  .pattern-btn:hover {
    background: var(--surface-2);
    border-color: var(--accent);
    color: var(--text);
    transform: translateY(-1px);
  }
  .pattern-btn.active {
    background: linear-gradient(135deg, rgba(255, 107, 26, 0.15), rgba(255, 61, 94, 0.1));
    border-color: var(--accent);
    color: var(--text);
  }
  .pattern-name {
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 2px;
    font-family: 'Bricolage Grotesque', sans-serif;
    letter-spacing: -0.01em;
  }
  .pattern-bpm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .pattern-btn.active .pattern-bpm { color: var(--accent-2); }

  /* Controls */
  .control-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .control-value {
    color: var(--accent-2);
    font-weight: 700;
  }
  .control-slider {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface-3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .control-slider::-webkit-slider-thumb {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-2);
    cursor: grab;
    box-shadow: 0 0 10px rgba(255, 214, 10, 0.5);
  }
  .control-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-2);
    cursor: grab;
    border: none;
    box-shadow: 0 0 10px rgba(255, 214, 10, 0.5);
  }

  /* === FOOTER === */
  footer {
    grid-area: footer;
    background: rgba(16, 12, 10, 0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    overflow-x: auto;
    white-space: nowrap;
  }
  .shortcut {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .key {
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    color: var(--text-2);
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
    font-size: 9px;
  }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* === TOAST === */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(255, 107, 26, 0.2);
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === RESPONSIVE === */
  @media (max-width: 1100px) {
    .app {
      grid-template-columns: 240px 1fr 280px;
    }
  }
  @media (max-width: 900px) {
    .app {
      grid-template-rows: auto 1fr 1fr 38px;
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "sequencer"
        "visual"
        "footer";
    }
    .mixer { display: none; }

    header {
      flex-wrap: wrap;
      padding: 10px 16px;
      gap: 10px;
    }
    .logo {
      font-size: 22px;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
    }
    .header-divider { display: none; }
    .bpm-control { order: 1; }
    .bpm-slider { width: 100px !important; }
    .transport { order: -1; margin-left: auto; }
    .bpm-label.play-label {
      display: none;
    }
  }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark" id="logoMark"></div>
      <div class="logo-text">PUL<span>S</span>E</div>
    </div>
    <div class="header-divider"></div>
    <div class="bpm-control">
      <div class="bpm-label">BPM</div>
      <div class="bpm-value" id="bpmValue">120</div>

// ===== AUDIO ENGINE =====
let audioCtx = null;
let masterGain, masterCompressor, analyser, reverbNode, reverbGain, dryGain;
let noiseBuffer = null;
let dataFreq = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = state.masterVolume;

  masterCompressor = audioCtx.createDynamicsCompressor();
  masterCompressor.threshold.value = -10;
  masterCompressor.knee.value = 8;
  masterCompressor.ratio.value = 4;
  masterCompressor.attack.value = 0.003;
  masterCompressor.release.value = 0.15;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.78;
  dataFreq = new Uint8Array(analyser.frequencyBinCount);

  // Reverb (convolver con impulse response sintetizado)
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = createReverbImpulse(2.0, 2.5);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = state.reverbAmount;
  dryGain = audioCtx.createGain();
  dryGain.gain.value = 1.0;

  // Routing: synth -> masterGain -> [dry + reverb] -> compressor -> analyser -> destination
  masterGain.connect(dryGain);
  masterGain.connect(reverbNode);
  reverbNode.connect(reverbGain);
  dryGain.connect(masterCompressor);
  reverbGain.connect(masterCompressor);
  masterCompressor.connect(analyser);
  analyser.connect(audioCtx.destination);

  // Buffer de ruido blanco
  const bufferSize = audioCtx.sampleRate * 1;
  noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
}

function createReverbImpulse(duration, decay) {
  const rate = audioCtx.sampleRate;
  const length = rate * duration;
  const impulse = audioCtx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

// ===== SÍNTESIS DE INSTRUMENTOS =====
function playKick(time, vol = 1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const click = audioCtx.createOscillator();
  const clickGain = audioCtx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);

  gain.gain.setValueAtTime(vol * 0.9, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.45);

  // Click para ataque
  click.type = 'triangle';
  click.frequency.value = 1200;
  clickGain.gain.setValueAtTime(vol * 0.3, time);
  clickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.02);

  osc.connect(gain);
  click.connect(clickGain);
  gain.connect(masterGain);
  clickGain.connect(masterGain);

  osc.start(time);
  click.start(time);
  osc.stop(time + 0.5);
  click.stop(time + 0.05);
}

function playSnare(time, vol = 1) {
  // Ruido
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'highpass';
  noiseFilter.frequency.value = 1500;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(vol * 0.55, time);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(masterGain);

  // Tono
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(220, time);
  osc.frequency.exponentialRampToValueAtTime(110, time + 0.1);
  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(vol * 0.4, time);
  oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);

  osc.connect(oscGain);
  oscGain.connect(masterGain);

  noise.start(time);
  osc.start(time);
  osc.stop(time + 0.15);
  noise.stop(time + 0.2);
}

function playClap(time, vol = 1) {
  // Tres ráfagas de ruido para emular palmadas
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1200;
  filter.Q.value = 1.2;
  filter.connect(masterGain);

  for (let i = 0; i < 3; i++) {
    const t = time + i * 0.012;
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol * 0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    noise.connect(g);
    g.connect(filter);
    noise.start(t);
    noise.stop(t + 0.12);
  }
}

function playHat(time, vol = 1, open = false) {
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 7000;
  const filter2 = audioCtx.createBiquadFilter();
  filter2.type = 'bandpass';
  filter2.frequency.value = 10000;
  filter2.Q.value = 0.8;

  const decay = open ? 0.3 : 0.06;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol * 0.35, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + decay);

  noise.connect(filter);
  filter.connect(filter2);
  filter2.connect(g);
  g.connect(masterGain);

  noise.start(time);
  noise.stop(time + decay + 0.05);
}

function playTom(time, vol = 1) {
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, time);
  osc.frequency.exponentialRampToValueAtTime(90, time + 0.25);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol * 0.7, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(time);
  osc.stop(time + 0.35);
}

function playCymbal(time, vol = 1) {
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 5000;
  const filter2 = audioCtx.createBiquadFilter();
  filter2.type = 'bandpass';
  filter2.frequency.value = 8000;
  filter2.Q.value = 0.5;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol * 0.3, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
  noise.connect(filter);
  filter.connect(filter2);
  filter2.connect(g);
  g.connect(masterGain);
  noise.start(time);
  noise.stop(time + 0.7);
}

function playPerc(time, vol = 1) {
  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(880, time);
  osc.frequency.exponentialRampToValueAtTime(220, time + 0.08);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1500;
  filter.Q.value = 2;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol * 0.35, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
  osc.connect(filter);
  filter.connect(g);
  g.connect(masterGain);
  osc.start(time);
  osc.stop(time + 0.12);
}

function triggerInstrument(synthType, time, vol) {
  switch(synthType) {
    case 'kick':  playKick(time, vol); break;
    case 'snare': playSnare(time, vol); break;
    case 'clap':  playClap(time, vol); break;
    case 'hatc':  playHat(time, vol, false); break;
    case 'hato':  playHat(time, vol, true); break;
    case 'tom':   playTom(time, vol); break;
    case 'cymb':  playCymbal(time, vol); break;
    case 'perc':  playPerc(time, vol); break;
  }
}

// ===== SECUENCIADOR =====
let nextNoteTime = 0;
let lookahead = 25.0; // ms
let scheduleAheadTime = 0.1; // s
let timerID = null;

function nextNote() {
  const secondsPerBeat = 60.0 / state.bpm;
  const stepDuration = secondsPerBeat / 4; // 16th notes

  // Aplicar swing
  if (state.currentStep % 2 === 0) {
    nextNoteTime += stepDuration * (1 - state.swing / 200);
  } else {
    nextNoteTime += stepDuration * (1 + state.swing / 200);
  }

  state.currentStep = (state.currentStep + 1) % NUM_STEPS;
}

function scheduleNote(step, time) {
  state.tracks.forEach((track, idx) => {
    const stepVal = track.steps[step];
    if (stepVal === 0) return;
    if (track.muted) return;
    // Solo logic
    const anySolo = state.tracks.some(t => t.solo);
    if (anySolo && !track.solo) return;

    const vol = stepVal === 2 ? track.volume * 1.3 : track.volume;
    triggerInstrument(track.synth, time, vol);

    // Programar partículas visuales
    scheduleParticle(idx, step, track.color);
  });
}

function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
    scheduleNote(state.currentStep, nextNoteTime);
    // Programar actualización visual
    const step = state.currentStep;
    const delay = (nextNoteTime - audioCtx.currentTime) * 1000;
    setTimeout(() => updateVisualStep(step), Math.max(0, delay));
    nextNote();
  }
  timerID = setTimeout(scheduler, lookahead);
}

function startPlayback() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  state.isPlaying = true;
  state.currentStep = -1;
  nextNoteTime = audioCtx.currentTime + 0.05;
  scheduler();
  updatePlayButton();
  document.getElementById('logoMark').classList.add('playing');
}

function stopPlayback() {
  state.isPlaying = false;
  if (timerID) { clearTimeout(timerID); timerID = null; }
  state.currentStep = -1;
  updatePlayButton();
  document.getElementById('logoMark').classList.remove('playing');
  document.getElementById('currentStepDisplay').textContent = '--';
  // Limpiar beam y current cells
  document.querySelectorAll('.cell.current').forEach(c => c.classList.remove('current'));
  document.querySelectorAll('.step-num.current').forEach(c => c.classList.remove('current'));
  document.getElementById('beam').classList.remove('active');
}

function togglePlay() {
  if (state.isPlaying) stopPlayback();
  else startPlayback();
}

function updatePlayButton() {
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  if (state.isPlaying) {
    btn.classList.add('playing');
    icon.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
  } else {
    btn.classList.remove('playing');
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function updateVisualStep(step) {
  // Actualizar beam
  const beam = document.getElementById('beam');
  beam.classList.add('active');
  const grid = document.getElementById('grid');
  const gridRect = grid.getBoundingClientRect();
  const cellWidth = (gridRect.width - 80) / NUM_STEPS;
  beam.style.transform = `translateX(${step * (cellWidth + 4)}px)`;
  beam.style.width = `${cellWidth}px`;

  // Actualizar cells current
  document.querySelectorAll('.cell.current').forEach(c => c.classList.remove('current'));
  document.querySelectorAll('.step-num.current').forEach(c => c.classList.remove('current'));
  document.querySelectorAll(`.cell[data-step="${step}"]`).forEach(c => c.classList.add('current'));
  document.querySelectorAll(`.step-num[data-step="${step}"]`).forEach(c => c.classList.add('current'));

  document.getElementById('currentStepDisplay').textContent = String(step + 1).padStart(2, '0');
}

// ===== PARTÍCULAS =====
const particlesCanvas = document.getElementById('particles');
const pCtx = particlesCanvas.getContext('2d');
let particles = [];
let scheduledParticles = [];

function resizeParticlesCanvas() {
  const rect = particlesCanvas.parentElement.getBoundingClientRect();
  particlesCanvas.width = rect.width;
  particlesCanvas.height = rect.height;
}

function scheduleParticle(trackIdx, step, color) {
  scheduledParticles.push({ trackIdx, step, color, time: performance.now() });
}

function spawnParticle(trackIdx, step, color) {
  const grid = document.getElementById('grid');
  const cell = grid.querySelector(`.cell[data-track="${trackIdx}"][data-step="${step}"]`);
  if (!cell) return;
  const gridRect = grid.getBoundingClientRect();
  const cellRect = cell.getBoundingClientRect();
  const x = cellRect.left - gridRect.left + cellRect.width / 2;
  const y = cellRect.top - gridRect.top + cellRect.height / 2;

  // Convertir a coordenadas del canvas de partículas
  const seqRect = particlesCanvas.parentElement.getBoundingClientRect();
  const px = cellRect.left - seqRect.left + cellRect.width / 2;
  const py = cellRect.top - seqRect.top + cellRect.height / 2;

  const count = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      size: 2 + Math.random() * 2,
      color
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);

  // Spawn scheduled
  const now = performance.now();
  scheduledParticles = scheduledParticles.filter(sp => {
    if (now >= sp.time) {
      spawnParticle(sp.trackIdx, sp.step, sp.color);
      return false;
    }
    return true;
  });

  // Update
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) return false;

    pCtx.globalAlpha = p.life;
    pCtx.fillStyle = p.color;
    pCtx.shadowColor = p.color;
    pCtx.shadowBlur = 8;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fill();
    return true;
  });
  pCtx.globalAlpha = 1;
  pCtx.shadowBlur = 0;

  requestAnimationFrame(updateParticles);
}

// ===== VISUALIZADOR DE ESPECTRO =====
const vizCanvas = document.getElementById('visualizer');
const vCtx = vizCanvas.getContext('2d');

function resizeVizCanvas() {
  const rect = vizCanvas.getBoundingClientRect();
  vizCanvas.width = rect.width * window.devicePixelRatio;
  vizCanvas.height = rect.height * window.devicePixelRatio;
  vCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

let vizRotation = 0;
function drawVisualizer() {
  const w = vizCanvas.width / window.devicePixelRatio;
  const h = vizCanvas.height / window.devicePixelRatio;
  const cx = w / 2;
  const cy = h / 2;
  const baseRadius = Math.min(w, h) * 0.28;

  vCtx.clearRect(0, 0, w, h);

  // Fondo radial
  const bgGrad = vCtx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.6);
  bgGrad.addColorStop(0, 'rgba(255, 107, 26, 0.06)');
  bgGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  vCtx.fillStyle = bgGrad;
  vCtx.fillRect(0, 0, w, h);

  // Obtener datos de frecuencia
  if (analyser && dataFreq) {
    analyser.getByteFrequencyData(dataFreq);
  }

  // Anillos concéntricos
  for (let r = 0; r < 3; r++) {
    vCtx.beginPath();
    vCtx.arc(cx, cy, baseRadius - r * 10, 0, Math.PI * 2);
    vCtx.strokeStyle = `rgba(255, 107, 26, ${0.08 - r * 0.02})`;
    vCtx.lineWidth = 1;
    vCtx.stroke();
  }

  // Barras radiales
  const bars = 64;
  vizRotation += 0.003;
  for (let i = 0; i < bars; i++) {
    const value = dataFreq ? dataFreq[Math.floor(i * dataFreq.length / bars)] : 0;
    const norm = value / 255;
    const barLength = norm * baseRadius * 0.9 + 2;
    const angle = (i / bars) * Math.PI * 2 + vizRotation;
    const x1 = cx + Math.cos(angle) * baseRadius;
    const y1 = cy + Math.sin(angle) * baseRadius;
    const x2 = cx + Math.cos(angle) * (baseRadius + barLength);
    const y2 = cy + Math.sin(angle) * (baseRadius + barLength);

    const hue = i / bars;
    let color;
    if (hue < 0.33) color = `rgba(255, 107, 26, ${0.4 + norm * 0.6})`;
    else if (hue < 0.66) color = `rgba(255, 61, 94, ${0.4 + norm * 0.6})`;
    else color = `rgba(255, 214, 10, ${0.4 + norm * 0.6})`;

    vCtx.strokeStyle = color;
    vCtx.lineWidth = 2;
    vCtx.lineCap = 'round';
    vCtx.beginPath();
    vCtx.moveTo(x1, y1);
    vCtx.lineTo(x2, y2);
    vCtx.stroke();
  }

  // Círculo central pulsante
  const pulseRadius = baseRadius * 0.7;
  const beat = state.isPlaying ? (Math.sin(performance.now() * 0.001 * state.bpm / 60 * Math.PI) * 0.5 + 0.5) : 0.3;
  const grad = vCtx.createRadialGradient(cx, cy, 0, cx, cy, pulseRadius);
  grad.addColorStop(0, `rgba(255, 214, 10, ${0.15 + beat * 0.15})`);
  grad.addColorStop(0.7, 'rgba(255, 107, 26, 0.05)');
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  vCtx.fillStyle = grad;
  vCtx.beginPath();
  vCtx.arc(cx, cy, pulseRadius, 0, Math.PI * 2);
  vCtx.fill();

  // Texto BPM central
  vCtx.fillStyle = 'rgba(245, 237, 224, 0.9)';
  vCtx.font = '700 28px "Bricolage Grotesque", sans-serif';
  vCtx.textAlign = 'center';
  vCtx.textBaseline = 'middle';
  vCtx.fillText(state.bpm, cx, cy - 4);
  vCtx.font = '500 9px "JetBrains Mono", monospace';
  vCtx.fillStyle = 'rgba(138, 120, 100, 0.9)';
  vCtx.fillText('BPM', cx, cy + 14);

  // Pequeño indicador de step
  if (state.isPlaying && state.currentStep >= 0) {
    const stepAngle = (state.currentStep / NUM_STEPS) * Math.PI * 2 - Math.PI / 2;
    const sx = cx + Math.cos(stepAngle) * (baseRadius * 0.55);
    const sy = cy + Math.sin(stepAngle) * (baseRadius * 0.55);
    vCtx.fillStyle = '#ffd60a';
    vCtx.shadowColor = '#ffd60a';
    vCtx.shadowBlur = 12;
    vCtx.beginPath();
    vCtx.arc(sx, sy, 4, 0, Math.PI * 2);
    vCtx.fill();
    vCtx.shadowBlur = 0;
  }

  requestAnimationFrame(drawVisualizer);
}

// ===== UI: CONSTRUIR GRID =====
function buildStepNumbers() {
  const container = document.getElementById('stepNumbers');
  container.innerHTML = '<div></div>'; // Espacio para labels
  for (let i = 0; i < NUM_STEPS; i++) {
    const num = document.createElement('div');
    num.className = 'step-num';
    if (i % 4 === 0) num.classList.add('beat');
    num.dataset.step = i;
    num.textContent = i + 1;
    container.appendChild(num);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  state.tracks.forEach((track, trackIdx) => {
    const label = document.createElement('div');
    label.className = 'row-label';
    label.style.setProperty('--track-color', track.color);
    label.textContent = track.name;
    grid.appendChild(label);

    for (let step = 0; step < NUM_STEPS; step++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (step % 4 === 0) cell.classList.add('beat-start');
      cell.dataset.track = trackIdx;
      cell.dataset.step = step;
      cell.style.setProperty('--track-color', track.color);

      cell.addEventListener('click', () => toggleCell(trackIdx, step));
      cell.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        toggleCell(trackIdx, step, true);
      });

      grid.appendChild(cell);
    }
  });
}

function toggleCell(trackIdx, step, accent = false) {
  const current = state.tracks[trackIdx].steps[step];
  if (accent) {
    // Click derecho: ciclo off -> accent -> off
    if (current === 2) {
      state.tracks[trackIdx].steps[step] = 0;
    } else {
      state.tracks[trackIdx].steps[step] = 2;
    }
  } else {
    // Click izquierdo: ciclo off -> on -> off
    if (current === 1) {
      state.tracks[trackIdx].steps[step] = 0;
    } else {
      state.tracks[trackIdx].steps[step] = 1;
    }
  }
  updateCell(trackIdx, step);
}

function updateCell(trackIdx, step) {
  const cell = document.querySelector(`.cell[data-track="${trackIdx}"][data-step="${step}"]`);
  if (!cell) return;
  cell.classList.remove('active', 'accent');
  const val = state.tracks[trackIdx].steps[step];
  if (val === 1) cell.classList.add('active');
  else if (val === 2) cell.classList.add('active', 'accent');
}

function refreshAllCells() {
  state.tracks.forEach((track, trackIdx) => {
    for (let step = 0; step < NUM_STEPS; step++) {
      updateCell(trackIdx, step);
    }
  });
}

// ===== UI: MIXER =====
function buildMixer() {
  const container = document.getElementById('tracks');
  container.innerHTML = '';
  state.tracks.forEach((track, idx) => {
    const el = document.createElement('div');
    el.className = 'track';
    el.dataset.idx = idx;
    el.style.setProperty('--track-color', track.color);
    el.innerHTML = `
      <div class="track-head">
        <div class="track-name">${track.name}</div>
        <div class="track-buttons">
          <button class="track-btn mute" data-action="mute" title="Silenciar">M</button>
          <button class="track-btn solo" data-action="solo" title="Solo">S</button>
        </div>
      </div>
      <input type="range" class="track-vol" min="0" max="100" value="${track.volume * 100}" data-action="vol">
    `;
    container.appendChild(el);

    const volSlider = el.querySelector('.track-vol');
    volSlider.addEventListener('input', (e) => {
      state.tracks[idx].volume = e.target.value / 100;
    });

    el.querySelector('[data-action="mute"]').addEventListener('click', () => {
      state.tracks[idx].muted = !state.tracks[idx].muted;
      el.classList.toggle('muted', state.tracks[idx].muted);
      el.querySelector('[data-action="mute"]').classList.toggle('active', state.tracks[idx].muted);
    });

    el.querySelector('[data-action="solo"]').addEventListener('click', () => {
      state.tracks[idx].solo = !state.tracks[idx].solo;
      el.querySelector('[data-action="solo"]').classList.toggle('active', state.tracks[idx].solo);
    });
  });
}

// ===== UI: PATRONES =====
function buildPatterns() {
  const container = document.getElementById('patterns');
  container.innerHTML = '';
  Object.entries(PATTERNS).forEach(([key, pat]) => {
    const btn = document.createElement('button');
    btn.className = 'pattern-btn';
    if (key === state.activePattern) btn.classList.add('active');
    btn.innerHTML = `
      <div class="pattern-name">${pat.name}</div>
      <div class="pattern-bpm">${pat.bpm} BPM</div>
    `;
    btn.addEventListener('click', () => loadPattern(key));
    container.appendChild(btn);
  });
}

function loadPattern(key) {
  const pat = PATTERNS[key];
  if (!pat) return;
  state.activePattern = key;
  state.bpm = pat.bpm;
  document.getElementById('bpmSlider').value = pat.bpm;
  document.getElementById('bpmValue').textContent = pat.bpm;
  pat.steps.forEach((steps, idx) => {
    state.tracks[idx].steps = [...steps];
  });
  refreshAllCells();
  document.querySelectorAll('.pattern-btn').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(PATTERNS)[i] === key);
  });
  showToast(`Patrón cargado: ${pat.name}`);
}

// ===== ACCIONES =====
function clearPattern() {
  state.tracks.forEach(t => { t.steps = new Array(NUM_STEPS).fill(0); });
  refreshAllCells();
  showToast('Patrón limpiado');
}

function randomPattern() {
  // Generar patrón aleatorio con cierta lógica musical
  state.tracks[0].steps = Array.from({length: NUM_STEPS}, (_, i) => i % 4 === 0 ? 1 : (Math.random() < 0.15 ? 1 : 0));
  state.tracks[1].steps = Array.from({length: NUM_STEPS}, (_, i) => i % 8 === 4 ? 1 : (Math.random() < 0.1 ? 1 : 0));
  state.tracks[2].steps = Array.from({length: NUM_STEPS}, (_, i) => i % 8 === 4 ? (Math.random() < 0.7 ? 1 : 0) : 0);
  state.tracks[3].steps = Array.from({length: NUM_STEPS}, () => Math.random() < 0.55 ? 1 : 0);
  state.tracks[4].steps = Array.from({length: NUM_STEPS}, (_, i) => i === 15 ? 1 : (Math.random() < 0.1 ? 1 : 0));
  state.tracks[5].steps = Array.from({length: NUM_STEPS}, () => Math.random() < 0.08 ? 1 : 0);
  state.tracks[6].steps = Array.from({length: NUM_STEPS}, (_, i) => i === 0 ? 1 : (Math.random() < 0.05 ? 1 : 0));
  state.tracks[7].steps = Array.from({length: NUM_STEPS}, () => Math.random() < 0.2 ? 1 : 0);
  refreshAllCells();
  showToast('Patrón aleatorio generado');
}

function savePattern() {
  const data = {
    bpm: state.bpm,
    swing: state.swing,
    tracks: state.tracks.map(t => ({ steps: t.steps, volume: t.volume }))
  };
  localStorage.setItem('pulse_pattern', JSON.stringify(data));
  showToast('Patrón guardado');
}

function loadSavedPattern() {
  const raw = localStorage.getItem('pulse_pattern');
  if (!raw) { showToast('No hay patrón guardado'); return; }
  try {
    const data = JSON.parse(raw);
    state.bpm = data.bpm;
    state.swing = data.swing;
    document.getElementById('bpmSlider').value = data.bpm;
    document.getElementById('bpmValue').textContent = data.bpm;
    document.getElementById('swingSlider').value = data.swing;
    document.getElementById('swingValue').textContent = data.swing;
    data.tracks.forEach((t, i) => {
      if (i < state.tracks.length) {
        state.tracks[i].steps = [...t.steps];
        state.tracks[i].volume = t.volume;
      }
    });
    refreshAllCells();
    buildMixer();
    showToast('Patrón cargado');
  } catch(e) {
    showToast('Error al cargar');
  }
}

// ===== TOAST =====
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== EVENT HANDLERS =====
document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('clearBtn').addEventListener('click', clearPattern);
document.getElementById('randomBtn').addEventListener('click', randomPattern);
document.getElementById('saveBtn').addEventListener('click', savePattern);
document.getElementById('loadBtn').addEventListener('click', loadSavedPattern);

document.getElementById('bpmSlider').addEventListener('input', (e) => {
  state.bpm = parseInt(e.target.value);
  document.getElementById('bpmValue').textContent = state.bpm;
});

document.getElementById('swingSlider').addEventListener('input', (e) => {
  state.swing = parseInt(e.target.value);
  document.getElementById('swingValue').textContent = state.swing;
});

document.getElementById('masterVol').addEventListener('input', (e) => {
  state.masterVolume = e.target.value / 100;
  document.getElementById('masterVolValue').textContent = e.target.value;
  if (masterGain) masterGain.gain.value = state.masterVolume;
});

document.getElementById('reverbSlider').addEventListener('input', (e) => {
  state.reverbAmount = e.target.value / 100;
  document.getElementById('reverbValue').textContent = e.target.value;
  if (reverbGain) reverbGain.gain.value = state.reverbAmount;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'c' || e.key === 'C') clearPattern();
  else if (e.key === 'r' || e.key === 'R') randomPattern();
  else if (e.key >= '1' && e.key <= '8') {
    const idx = parseInt(e.key) - 1;
    if (idx < state.tracks.length) {
      state.tracks[idx].muted = !state.tracks[idx].muted;
      const trackEl = document.querySelector(`.track[data-idx="${idx}"]`);
      trackEl.classList.toggle('muted', state.tracks[idx].muted);
      trackEl.querySelector('[data-action="mute"]').classList.toggle('active', state.tracks[idx].muted);
    }
  }
  else if (e.key === 'ArrowUp') {
    state.bpm = Math.min(200, state.bpm + 1);
    document.getElementById('bpmSlider').value = state.bpm;
    document.getElementById('bpmValue').textContent = state.bpm;
  }
  else if (e.key === 'ArrowDown') {
    state.bpm = Math.max(60, state.bpm - 1);
    document.getElementById('bpmSlider').value = state.bpm;
    document.getElementById('bpmValue').textContent = state.bpm;
  }
});

// Resize
window.addEventListener('resize', () => {
  resizeParticlesCanvas();
  resizeVizCanvas();
});

// ===== INICIALIZACIÓN =====
function init() {
  buildStepNumbers();
  buildGrid();
  buildMixer();
  buildPatterns();
  loadPattern('house');
  resizeParticlesCanvas();
  resizeVizCanvas();
  updateParticles();
  drawVisualizer();

  // Mensaje de bienvenida
  setTimeout(() => showToast('Pulsa SPACE para iniciar'), 500);
}

init();
</script>
</body>
